<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Error Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="app">

  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 12h4l2-7 4 14 3-9 2 6h5"/>
        </svg>
      </div>
      <div>
        <h1>Error Tracker</h1>
        <p id="categoryLine" class="subtitle">ASRS · Infolog · AMR</p>
      </div>
    </div>
    <div class="header-right">
      <span id="todayCount">0</span>
      <span class="today-label">today</span>
    </div>
  </header>

  <main class="main">

    <!-- Log an error -->
    <section class="card log-card">
      <div class="log-card-head">
        <h2>Log an error</h2>
        <div class="category-pills" id="categoryPills">
          <button class="pill active" data-cat="ASRS">ASRS</button>
          <button class="pill" data-cat="Infolog">Infolog</button>
          <button class="pill" data-cat="AMR">AMR</button>
          <button class="pill" data-cat="Other">Other</button>
        </div>
      </div>

      <div class="field-group">
        <label class="field-label">Quick select</label>
        <div class="quick-select" id="quickSelect"></div>
      </div>

      <div class="field-group">
        <textarea id="description" placeholder="Describe the error..." rows="3"></textarea>
      </div>

      <div class="field-row">
        <div class="field-group grow">
          <label class="field-label">Time</label>
          <div class="time-input-wrap">
            <input type="datetime-local" id="timestamp" />
            <button type="button" class="btn-now" id="nowBtn">Now</button>
          </div>
        </div>
      </div>

      <div class="field-group">
        <input type="text" id="notes" placeholder="Optional notes..." />
      </div>

      <div class="field-group">
        <label class="field-label">Photo</label>
        <div class="photo-upload" id="photoUpload">
          <input type="file" id="photoInput" accept="image/*" hidden />
          <div class="photo-placeholder" id="photoPlaceholder">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/><path d="M17 8l2-2 2 2M19 6v6" stroke-width="0"/></svg>
            <span>Add photo</span>
          </div>
          <img id="photoPreview" class="photo-preview" hidden />
          <button type="button" id="removePhoto" class="remove-photo" hidden title="Remove photo">&times;</button>
        </div>
      </div>

      <div class="log-card-foot">
        <span id="formStatus" class="form-status"></span>
        <button id="logBtn" class="btn-primary">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13"/><path d="M22 2l-7 20-4-9-9-4 20-7z"/></svg>
          Log error
        </button>
      </div>
    </section>

    <!-- Stats -->
    <section class="stats" id="stats">
      <div class="stat-card">
        <div class="stat-dot" style="background:#6C5CE7"></div>
        <div class="stat-num" id="statASRS">0</div>
        <div class="stat-label">ASRS</div>
      </div>
      <div class="stat-card">
        <div class="stat-dot" style="background:#10B981"></div>
        <div class="stat-num" id="statInfolog">0</div>
        <div class="stat-label">INFOLOG</div>
      </div>
      <div class="stat-card">
        <div class="stat-dot" style="background:#F59E0B"></div>
        <div class="stat-num" id="statAMR">0</div>
        <div class="stat-label">AMR</div>
      </div>
      <div class="stat-card">
        <div class="stat-dot" style="background:#6B7280"></div>
        <div class="stat-num" id="statOther">0</div>
        <div class="stat-label">OTHER</div>
      </div>
    </section>

    <!-- Recent errors -->
    <section class="card list-card">
      <div class="list-head">
        <h2>Recent errors</h2>
        <div class="list-head-right">
          <span id="entryCount" class="entry-count">0 entries</span>
          <div class="export-menu">
            <button id="exportBtn" class="btn-export" title="Export data">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/></svg>
              Export
            </button>
            <div class="export-dropdown" id="exportDropdown" hidden>
              <button data-format="xlsx">Excel (.xlsx)</button>
              <button data-format="csv">CSV (.csv)</button>
              <button data-format="txt">Text (.txt)</button>
            </div>
          </div>
        </div>
      </div>

      <input type="text" id="searchInput" class="search-input" placeholder="Search errors..." />

      <div class="filter-row" id="filterRow">
        <button class="filter-pill active" data-filter="All">All</button>
        <button class="filter-pill" data-filter="ASRS">ASRS</button>
        <button class="filter-pill" data-filter="Infolog">Infolog</button>
        <button class="filter-pill" data-filter="AMR">AMR</button>
        <button class="filter-pill" data-filter="Other">Other</button>
      </div>

      <div class="error-list" id="errorList">
        <div class="empty-state" id="emptyState">No errors logged yet.</div>
      </div>
    </section>

  </main>
</div>

<!-- lightbox for photo viewing -->
<div class="lightbox" id="lightbox" hidden>
  <img id="lightboxImg" src="" alt="Error photo" />
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
